<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f2f5;color:#1a1a1a;min-height:100vh}
.header{background:#1a3a5c;color:#fff;padding:1rem 1.25rem}
.header h1{font-size:17px;font-weight:600}
.header p{font-size:12px;opacity:.7;margin-top:2px}
.body{padding:1rem;display:flex;flex-direction:column;gap:1rem}
.card{background:#fff;border-radius:14px;border:1px solid #e4e4e4;padding:1rem 1.25rem}
.card-title{font-size:12px;font-weight:600;color:#888;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.btn-primary{width:100%;padding:13px;border-radius:10px;border:none;background:#1a3a5c;color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.btn-primary:active{opacity:.85}
.btn-secondary{width:100%;padding:11px;border-radius:10px;border:1px solid #ccc;background:#fff;color:#444;font-size:14px;cursor:pointer;margin-top:8px}
.btn-secondary:active{background:#f5f5f5}
.btn-danger{width:100%;padding:11px;border-radius:10px;border:1px solid #fca5a5;background:#fff;color:#991b1b;font-size:14px;cursor:pointer;margin-top:8px}

#scanner-wrap{display:none;flex-direction:column;gap:10px;margin-top:12px}
#scanner-wrap.active{display:flex}
#video-container{position:relative;border-radius:10px;overflow:hidden;background:#000;width:100%;aspect-ratio:4/3}
video{width:100%;height:100%;object-fit:cover;display:block}
canvas#overlay{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.scan-guide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.scan-box{width:85%;aspect-ratio:1;border:3px solid rgba(255,255,255,.95);border-radius:8px;box-shadow:0 0 0 9999px rgba(0,0,0,.5)}
.scan-line{position:absolute;width:55%;height:2px;background:linear-gradient(90deg,transparent,#4ade80,transparent);animation:scanline 2s ease-in-out infinite}
@keyframes scanline{0%,100%{top:22%}50%{top:75%}}
#scan-status{text-align:center;font-size:13px;color:#555;padding:4px 0}

.input-row{display:flex;gap:8px}
#manual-inp{flex:1;padding:10px 12px;border-radius:8px;border:1px solid #ccc;font-size:15px;font-family:monospace;background:#fafafa}
#manual-inp:focus{outline:none;border-color:#1a3a5c}
.search-btn{padding:10px 16px;border-radius:8px;border:none;background:#1a3a5c;color:#fff;font-size:14px;font-weight:600;cursor:pointer}

textarea{width:100%;min-height:90px;border-radius:8px;border:1px solid #ccc;padding:8px 10px;font-size:13px;font-family:monospace;resize:vertical;background:#fafafa}
textarea:focus{outline:none;border-color:#1a3a5c}

.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.stat{background:#f8f8f8;border-radius:8px;padding:10px;text-align:center}
.stat .num{font-size:26px;font-weight:700}
.stat .lbl{font-size:11px;color:#777;margin-top:2px}
.found-stat .num{color:#166534}
.missing-stat .num{color:#991b1b}
hr{border:none;border-top:1px solid #eee;margin:8px 0}
.result-item{display:flex;flex-direction:column;padding:10px 12px;border-radius:10px;font-size:13px;margin-bottom:6px;position:relative}
.r-code{font-family:monospace;font-weight:700;font-size:15px}
.r-desc{font-size:12px;margin-top:3px;opacity:.85}
.r-badge{font-size:11px;font-weight:600;margin-top:5px;display:inline-block;padding:2px 9px;border-radius:20px}
.r-new{position:absolute;top:8px;right:10px;font-size:10px;background:#dbeafe;color:#1e40af;padding:2px 7px;border-radius:20px;font-weight:600}
.found{background:#f0fdf4;border:1px solid #86efac}
.found .r-code{color:#166534}
.found .r-badge{background:#dcfce7;color:#166534}
.not-found{background:#fef2f2;border:1px solid #fca5a5}
.not-found .r-code{color:#991b1b}
.not-found .r-badge{background:#fee2e2;color:#991b1b}

.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);background:#1a3a5c;color:#fff;padding:10px 20px;border-radius:30px;font-size:14px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

let results = [];
let stream = null;
let scanning = false;
let scanInterval = null;
let lastCode = null;
let lastCodeTime = 0;

function toast(msg, dur=2500){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

function lookup(raw){
  const key=raw.trim().toUpperCase();
  return {key,found:key in DB,desc:DB[key]||''};
}

function addResult(raw,isNew=false){
  const {key,found,desc}=lookup(raw);
  if(results.find(r=>r.key===key)){toast('Já pesquisado: '+key);return found;}
  results.unshift({key,found,desc,isNew});
  renderResults();
  return found;
}

function renderResults(){
  const ok=results.filter(r=>r.found).length;
  const no=results.filter(r=>!r.found).length;
  document.getElementById('cnt-ok').textContent=ok;
  document.getElementById('cnt-no').textContent=no;
  document.getElementById('res-card').style.display='block';
  document.getElementById('results-list').innerHTML=results.map(r=>`
    <div class="result-item ${r.found?'found':'not-found'}">
      <span class="r-code">${r.key}</span>
      ${r.found?`<span class="r-desc">${r.desc}</span>`:''}
      <span class="r-badge">${r.found?'✓ Em stock':'✗ Não encontrado'}</span>
      ${r.isNew?'<span class="r-new">novo</span>':''}
    </div>`).join('');
  results=results.map(r=>({...r,isNew:false}));
}

function searchOne(){
  const inp=document.getElementById('manual-inp');
  const code=inp.value.trim();
  if(!code)return;
  const found=addResult(code);
  toast(found?'✓ Encontrado!':'✗ Não encontrado');
  inp.value='';inp.focus();
}

function searchBatch(){
  const lines=document.getElementById('batch-inp').value.split('\n').map(l=>l.trim()).filter(Boolean);
  if(!lines.length)return;
  lines.forEach(c=>addResult(c));
  document.getElementById('batch-inp').value='';
  toast(lines.length+' código(s) pesquisado(s)');
}

function clearAll(){
  results=[];lastCode=null;
  document.getElementById('results-list').innerHTML='';
  document.getElementById('cnt-ok').textContent=0;
  document.getElementById('cnt-no').textContent=0;
  document.getElementById('res-card').style.display='none';
}

async function startScan(){
  const wrap=document.getElementById('scanner-wrap');
  const video=document.getElementById('video');
  const status=document.getElementById('scan-status');
  document.getElementById('scan-btn').style.display='none';
  wrap.classList.add('active');
  status.textContent='A pedir acesso à câmara...';

  try{
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
      throw new Error('Este browser não suporta acesso à câmara. Usa Chrome em HTTPS.');
    }
    try{
      stream=await navigator.mediaDevices.getUserMedia({
        video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}
      });
    }catch(e1){
      // fallback sem restrições de câmara traseira
      stream=await navigator.mediaDevices.getUserMedia({video:true});
    }
    video.srcObject=stream;
    await video.play();
    status.textContent='Aponta para o código de barras';
    scanning=true;
    scanLoop(video);
  }catch(e){
    let msg='Erro ('+e.name+'): '+e.message;
    if(e.name==='NotAllowedError')msg='Permissão negada. Vai às definições do Chrome e permite o acesso à câmara para este site.';
    else if(e.name==='NotReadableError')msg='Câmara ocupada por outra aplicação. Fecha outras apps e tenta novamente.';
    else if(e.name==='NotFoundError')msg='Nenhuma câmara encontrada neste dispositivo.';
    else if(location.protocol!=='https:')msg='A câmara só funciona em HTTPS. Acede ao site via https://';
    status.textContent=msg;
    document.getElementById('scan-btn').style.display='';
    console.error(e.name, e.message);
  }
}

async function scanLoop(video){
  if(!scanning)return;
  const canvas=document.createElement('canvas');
  const ctx=canvas.getContext('2d');

  async function tick(){
    if(!scanning)return;
    if(video.readyState===video.HAVE_ENOUGH_DATA){
      // recortar a área central (85% da largura, quadrado) para melhor deteção
      const vw=video.videoWidth;
      const vh=video.videoHeight;
      const size=Math.round(vw*0.85);
      const sx=Math.round((vw-size)/2);
      const sy=Math.round((vh-size)/2);
      canvas.width=size;
      canvas.height=size;
      ctx.drawImage(video,sx,sy,size,size,0,0,size,size);
      try{
        const imageData=ctx.getImageData(0,0,size,size);
        const result=await ZXingWasm.readBarcodesFromImageData(imageData,{
          tryHarder:true,
          formats:['Code128','Code39','EAN13','EAN8','UPCA','UPCE','QRCode','DataMatrix','Codabar','ITF']
        });
        if(result&&result.length>0){
          const code=result[0].text;
          const now=Date.now();
          if(code!==lastCode||(now-lastCodeTime)>3000){
            lastCode=code;lastCodeTime=now;
            const found=addResult(code,true);
            if(navigator.vibrate)navigator.vibrate(found?[120]:[60,60,60]);
            toast(found?'✓ '+code+' — Em stock':'✗ '+code+' — Não encontrado',3000);
          }
        }
      }catch(e){}
    }
    if(scanning)requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function stopScan(){
  scanning=false;
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  document.getElementById('scanner-wrap').classList.remove('active');
  document.getElementById('scan-btn').style.display='block';
  document.getElementById('video').srcObject=null;
}

function exportTxt(){
  const found=results.filter(r=>r.found);
  const missing=results.filter(r=>!r.found);
  let txt='Pesquisa de Peças — '+new Date().toLocaleString('pt-PT')+'\n'+'='.repeat(50)+'\n\n';
  txt+='ENCONTRADOS ('+found.length+')\n'+'-'.repeat(30)+'\n';
  found.forEach(r=>txt+=r.key+'  |  '+r.desc+'\n');
  txt+='\nNÃO ENCONTRADOS ('+missing.length+')\n'+'-'.repeat(30)+'\n';
  missing.forEach(r=>txt+=r.key+'\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain;charset=utf-8'}));
  a.download='pesquisa_'+new Date().toISOString().slice(0,10)+'.txt';
  a.click();
}
